<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141416" />
      <stop offset="50%" stop-color="#24222d" />
      <stop offset="100%" stop-color="#0e0e11" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a6ef5" />
      <stop offset="100%" stop-color="#bfb3fe" />
    </linearGradient>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.03)" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background & Grid -->
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Ambient Light Blobs -->
  <circle cx="950" cy="50" r="250" fill="#8a6ef5" opacity="0.12" filter="url(#glow)" />
  <circle cx="250" cy="350" r="200" fill="#6750a4" opacity="0.1" filter="url(#glow)" />

  <!-- Main Presentation Group -->
  <g transform="translate(600, 200)" text-anchor="middle">
    
    <!-- Stylized Logo/Icon -->
    <g transform="translate(-150, -65) scale(2.8)" opacity="0.95">
      <!-- Outer elegant notebook loop -->
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15Z" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-2" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="30" y="-30" font-family="'Inter', 'Google Sans', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="1">
      NotebookLM
    </text>

    <!-- Subtitle -->
    <text y="40" font-family="'Inter', 'Google Sans Text', sans-serif" font-size="21" font-weight="400" fill="#a0a0ab" letter-spacing="0.5">
      Upload active browser tabs directly as sources right from the toolbar.
    </text>
  </g>

  <!-- Tagline / Badge -->
  <g transform="translate(450, 290)">
     <rect width="300" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="#3f3c47" />
     <text x="150" y="23" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#c4c4c9" text-anchor="middle" letter-spacing="2">
       CHROME EXTENSION
     </text>
  </g>
</svg>
